<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/custom.css" | relative_url }}"> <!-- Link to custom CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <h1>{{ site.title }}</h1>
  </header>

  <main>
    <a href="https://github.com/{{ site.github.username }}/{{ site.github.repository }} " target="_blank" class="btn btn-primary btn-sm">
    View on GitHub
    </a>

    {{ content }} <!-- This is where page content will go -->
  </main>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
    <p>Maintained by {{ site.github.username }}</p>
  </footer>
</body>

</html>
